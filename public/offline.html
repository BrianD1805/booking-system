<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offline | ZipBook</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eff6ff;color:#102033;font-family:Arial,Helvetica,sans-serif;padding:24px}
    .card{max-width:460px;background:white;border:1px solid #d8e5f4;border-radius:28px;padding:28px;box-shadow:0 22px 70px rgba(29,78,216,.13);text-align:center}
    img{width:96px;height:96px;border-radius:24px}.button{display:inline-block;margin-top:16px;border-radius:999px;background:#336699;color:white;padding:12px 18px;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <img src="/icons/icon-192.png" alt="" />
    <h1>You are offline</h1>
    <p>Please reconnect to view live appointment availability and manage bookings.</p>
    <a class="button" href="/">Try again</a>
  </main>
</body>
</html>
